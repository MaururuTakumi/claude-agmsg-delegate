name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  fixture-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test
        run: make test
      - name: Installer dry-run
        run: ./install.sh --dry-run --codex-home "$RUNNER_TEMP/codex-home"
